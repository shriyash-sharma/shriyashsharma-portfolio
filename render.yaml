# Render Blueprint — FastAPI backend (apps/api)
# Web deploys separately on Vercel (Root Directory: apps/web).
# Set secrets in the Render dashboard; do not commit real values.

services:
  - type: web
    name: portfolio-api
    runtime: python
    rootDir: apps/api
    plan: free
    healthCheckPath: /health/ready
    buildCommand: pip install uv && uv sync --frozen --no-dev --group local-embeddings
    preDeployCommand: uv run alembic upgrade head
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        sync: false
      # Use https://your-site.vercel.app in prod; http://localhost:3000 for local web → Render API.
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: ADMIN_BOOTSTRAP_NAME
        value: Platform Admin
