# Periodic ping to keep the Render free-tier API warm and reduce cold starts.
# Configure RENDER_HEALTH_URL (repository variable) — see docs/render-keepalive.md.

name: Render API keep-alive

on:
  schedule:
    # ~Every 10 minutes (UTC). Minutes offset from :00/:10 to reduce GitHub
    # scheduler drops during peak load (see GitHub schedule event docs).
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          # Trim accidental whitespace when pasting the repository variable.
          HEALTH_URL="$(printf '%s' "${HEALTH_URL}" | tr -d '\r\n' | xargs)"

          if [ -z "${HEALTH_URL}" ]; then
            echo "::warning::RENDER_HEALTH_URL is not set. Skipping ping."
            echo "Add the variable under Settings → Secrets and variables → Actions → Variables."
            exit 0
          fi

          echo "GET ${HEALTH_URL}"

          http_code="000"
          if ! http_code=$(curl -sS -o /tmp/keepalive-body.txt -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            "${HEALTH_URL}"); then
            echo "::warning::curl failed (network/DNS/timeout). Next scheduled run will retry."
            exit 0
          fi

          echo "HTTP status: ${http_code}"
          if [ -f /tmp/keepalive-body.txt ]; then
            echo "Response body (truncated):"
            head -c 512 /tmp/keepalive-body.txt || true
            echo
          fi

          if [ "${http_code}" = "200" ]; then
            echo "Keep-alive succeeded."
            exit 0
          fi

          echo "::warning::Expected HTTP 200, got ${http_code}. Next scheduled run will retry."
          exit 0
