services:
  web:
    build:
      context: ./apps/web
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: development
      FRONTEND_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql+asyncpg://portfolio:portfolio@postgres:5432/portfolio
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres

  postgres:
    # pgvector-enabled Postgres 16 — required by the RAG knowledge base
    # (the vanilla postgres image does not ship the `vector` extension).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  web_node_modules:
